# Build and publish multi-platform binaries to GitHub Releases.
# Trigger: push a tag v* (e.g. v1.0.0)
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          export CGO_ENABLED=0
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-linux-amd64 ./cmd/editor/
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-linux-arm64 ./cmd/editor/
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-darwin-amd64 ./cmd/editor/
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-darwin-arm64 ./cmd/editor/
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-windows-amd64.exe ./cmd/editor/

          cd dist
          for f in tuidit-linux-amd64 tuidit-linux-arm64; do chmod +x "$f"; done
          for f in tuidit-darwin-amd64 tuidit-darwin-arm64; do chmod +x "$f"; done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

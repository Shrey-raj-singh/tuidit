# Build and publish multi-platform binaries to GitHub Releases.
# Also builds .deb and publishes APT repo to GitHub Pages (enable Pages in repo Settings).
# Trigger: push a tag v* (e.g. v0.1.0)
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          export CGO_ENABLED=0
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist

          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-linux-amd64 ./cmd/editor/
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-linux-arm64 ./cmd/editor/
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-darwin-amd64 ./cmd/editor/
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit-darwin-arm64 ./cmd/editor/
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/tuidit.exe ./cmd/editor/

          cd dist
          for f in tuidit-linux-amd64 tuidit-linux-arm64; do chmod +x "$f"; done
          for f in tuidit-darwin-amd64 tuidit-darwin-arm64; do chmod +x "$f"; done

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build .deb packages
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          export VERSION
          cp dist/tuidit-linux-amd64 dist/tuidit-linux
          export ARCH=amd64
          nfpm pkg -f nfpm.yaml -p deb -t dist/
          cp dist/tuidit-linux-arm64 dist/tuidit-linux
          export ARCH=arm64
          nfpm pkg -f nfpm.yaml -p deb -t dist/

      - name: Build .rpm packages
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          export VERSION
          cp dist/tuidit-linux-amd64 dist/tuidit-linux
          export ARCH=x86_64
          nfpm pkg -f nfpm.yaml -p rpm -t dist/
          cp dist/tuidit-linux-arm64 dist/tuidit-linux
          export ARCH=aarch64
          nfpm pkg -f nfpm.yaml -p rpm -t dist/

      - name: Generate APT repo
        run: |
          mkdir -p apt-repo/pool/main/t/tuidit apt-repo/dists/stable/main/binary-amd64 apt-repo/dists/stable/main/binary-arm64
          cp dist/tuidit_*_amd64.deb dist/tuidit_*_arm64.deb apt-repo/pool/main/t/tuidit/
          cd apt-repo
          dpkg-scanpackages -m -a amd64 pool/main /dev/null | gzip -9c > dists/stable/main/binary-amd64/Packages.gz
          dpkg-scanpackages -m -a amd64 pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages -m -a arm64 pool/main /dev/null | gzip -9c > dists/stable/main/binary-arm64/Packages.gz
          dpkg-scanpackages -m -a arm64 pool/main /dev/null > dists/stable/main/binary-arm64/Packages
          apt-ftparchive -o APT::FTPArchive::Release::Architectures="amd64 arm64" -o APT::FTPArchive::Release::Codename=stable release dists/stable > dists/stable/Release

      - name: Generate DNF/RPM repo
        run: |
          sudo apt-get update -qq && sudo apt-get install -y createrepo-c
          mkdir -p rpm-repo/x86_64 rpm-repo/aarch64
          cp dist/*.x86_64.rpm rpm-repo/x86_64/
          cp dist/*.aarch64.rpm rpm-repo/aarch64/
          createrepo_c rpm-repo/x86_64
          createrepo_c rpm-repo/aarch64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare GitHub Pages (APT + DNF repos)
        run: |
          mkdir -p site-repo
          cp -r apt-repo/* site-repo/
          mkdir -p site-repo/rpm
          cp -r rpm-repo/x86_64 site-repo/rpm/
          cp -r rpm-repo/aarch64 site-repo/rpm/

      - name: Upload site for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-repo

  deploy-pages:
    if: success()
    needs: release
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  - Architecture: x64
    InstallerType: portable
    InstallerUrl: https://github.com/Shrey-raj-singh/tuidit/releases/download/v0.1.0/tuidit-windows-amd64.exe
    InstallerSha256: REPLACE_WITH_SHA256
ManifestType: installer
ManifestVersion: 1.6.0

# Installer manifest for winget-pkgs.
# Replace InstallerSha256 with the SHA256 of tuidit-windows-amd64.exe from the release.
# Get it from the release page or: (Get-FileHash -Algorithm SHA256 .\tuidit-windows-amd64.exe).Hash
PackageIdentifier: ShreyRajSingh.Tuidit
PackageVersion: 0.1.0
